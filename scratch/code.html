<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .window-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[400px] bg-white dark:bg-slate-900 rounded-xl window-shadow overflow-hidden flex flex-col">
        <header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-2 text-slate-900 dark:text-slate-100">
                <div class="size-6 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-[18px]" style="">bolt</span>
                </div>
                <h2 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight tracking-tight"
                    style="">Q助理</h2>
            </div>
            <div class="flex gap-2">
                <button
                    class="flex items-center justify-center rounded-full size-8 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors"
                    style="">
                    <span class="material-symbols-outlined text-[20px]" style="">remove</span>
                </button>
                <button
                    class="flex items-center justify-center rounded-full size-8 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 text-slate-500 transition-colors"
                    style="">
                    <span class="material-symbols-outlined text-[20px]" style="">close</span>
                </button>
            </div>
        </header>
        <main class="flex-1 flex flex-col items-center px-8 pt-12 pb-12 text-center">
            <h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-10" style="">登录Q助理电脑机器人</h1>
            <div class="relative group">
                <div
                    class="p-4 bg-white dark:bg-slate-800 rounded-2xl border-2 border-slate-50 dark:border-slate-700 shadow-sm transition-all group-hover:border-primary/30">
                    <div
                        class="size-52 bg-slate-100 dark:bg-slate-700 rounded-lg overflow-hidden flex items-center justify-center relative">
                        <img alt="QR Code for Login" class="w-full h-full object-contain p-2"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYlz03XjXcfIUZBtVUxiyRl7sUhJM3buNPenkgWlRG2ygjM22XAV9vDobby00Od7U5rshJEwOIlAZcdf0cefRFz5vyAvW8aEKl93pFaT_IrV9_h1JMf_jn7GyqWnDgUNYUG8Z1ziwhGkSl_cEQjemvmHACaHqQSB4A3muHJz77hWY15qU4ACGPjc3b79z_B22sMNJ1oDci7TCY4-ljdmejjfSuer7fEYNiqM45mmWYKvCfuB0MU6kUGkVLa288MY9ntZn-OlVXal1e"
                            style="">
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="bg-white p-1 rounded-md shadow-md">
                                <div class="size-6 bg-primary rounded flex items-center justify-center text-white">
                                    <span class="material-symbols-outlined text-[14px]" style="">bolt</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="absolute -top-1 -right-1 flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
                </div>
            </div>
            <div class="mt-10 flex flex-col items-center gap-2">
                <h3 class="text-slate-900 dark:text-slate-100 text-lg font-medium" style="">用Q助理扫一扫</h3>
            </div>
        </main>
    </div>

</body>

</html>
